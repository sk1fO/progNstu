services:
  mailserver:
    image: docker.io/mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail.example.local
    domainname: example.local
    ports:
      - "25:25"    # SMTP
      - "143:143"  # IMAP (без шифрования)
      - "587:587"  # Submission (STARTTLS)
      - "993:993"  # IMAPS (SSL/TLS)
    volumes:
      - maildata:/var/mail
      - mailstate:/var/mail-state
      - ./config/:/tmp/docker-mailserver/
    environment:
      - ENABLE_SPAMASSASSIN=1
      - ENABLE_CLAMAV=1
      - ENABLE_FAIL2BAN=1
      - ENABLE_POSTGREY=1
      - ONE_DIR=1
      - DMS_DEBUG=0
      - SPOOF_PROTECTION=0
      - REPORT_RECIPIENT=1

      - SMTP_ONLY=0
      - PERMIT_DOCKER=network
      - POSTFIX_VIRTUAL_MAILBOX_BASE=/var/mail

      # Настройки для отправки письма во внешний мир (Relay)
      - RELAY_HOST=smtp.gmail.com
      - RELAY_PORT=465
      - RELAY_USER=stamlerigo@gmail.com
      - RELAY_PASSWORD=sqmelloqrzxeole
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    restart: always

volumes:
  maildata:
  mailstate:
